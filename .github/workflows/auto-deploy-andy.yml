name: Auto-deploy on Andy push

on:
  push:
    branches:
      - andy

jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "XentnexAI Agent"
          git config user.email "ai-agent@xentnexai.com.au"

      - name: Merge andy into main
        run: |
          git merge origin/andy --no-edit --strategy-option=theirs
          git push origin main
