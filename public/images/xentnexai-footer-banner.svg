<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="XentnexAI footer banner background">
  <defs>

    <!-- Teal radial wash from bottom-left, very low opacity -->
    <radialGradient id="tealWash" cx="0%" cy="100%" r="75%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#2DD4BF" stop-opacity="0.12" />
      <stop offset="50%"  stop-color="#2DD4BF" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"    />
    </radialGradient>

    <!-- Subtle noise/grain texture using feTurbulence -->
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.65"
        numOctaves="3"
        stitchTiles="stitch"
        result="noise" />
      <feColorMatrix
        type="saturate"
        values="0"
        in="noise"
        result="greyNoise" />
      <feBlend
        in="SourceGraphic"
        in2="greyNoise"
        mode="overlay"
        result="blended" />
      <feComposite in="blended" in2="SourceGraphic" operator="in" />
    </filter>

  </defs>

  <!-- Base: Deep Navy -->
  <rect width="1280" height="320" fill="#0B1426" />

  <!-- Teal radial wash from bottom-left -->
  <rect width="1280" height="320" fill="url(#tealWash)" />

  <!-- Very subtle grain overlay for texture depth -->
  <rect width="1280" height="320" fill="#0B1426" opacity="0.0" filter="url(#grain)" />

  <!-- Top border: 1.5px teal rule, full width -->
  <line x1="0" y1="1" x2="1280" y2="1" stroke="#2DD4BF" stroke-width="1.5" />

</svg>
